<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>动物世界百科</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft YaHei";
}

/* ===== 导航栏 ===== */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 40px;
  background:rgba(0,0,0,0.3);
  color:white;
  transition:0.3s;
  z-index:999;
}

nav.scrolled{
  background:#1e3a5f;
}

nav a{
  color:white;
  margin:0 12px;
  text-decoration:none;
  font-weight:bold;
}

nav a:hover{
  color:#ffd700;
}

/* ===== 轮播 ===== */
.banner{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.banner img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 1.2s ease;
}

.banner img.active{
  opacity:1;
}

/* ===== 标题层 ===== */
.hero-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}

.hero-text h1{
  font-size:50px;
}

.hero-text p{
  font-size:20px;
  margin-top:10px;
}

/* ===== 搜索框 ===== */
.search{
  margin-top:20px;
}

.search input{
  padding:10px 15px;
  width:250px;
  border:none;
  border-radius:20px;
  outline:none;
}

/* ===== 分类卡片 ===== */
.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:60px 20px;
  background:#f4f6f8;
}

.card{
  width:220px;
  padding:20px;
  background:white;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

footer{
  text-align:center;
  padding:20px;
  background:#1e3a5f;
  color:white;
}
</style>
</head>

<body>

<!-- 导航 -->
<nav id="nav">
  <div>🐾 动物百科</div>
  <div>
    <a href="#">首页</a>
    <a href="land.html">陆地</a>
    <a href="sea.html">海洋</a>
    <a href="bird.html">鸟类</a>
    <a href="protect.html">保护</a>
  </div>
</nav>

<!-- 轮播 -->
<div class="banner">

  <img class="slide active" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  <img class="slide" src="https://images.unsplash.com/photo-1508672019048-805c876b67e2">
  <img class="slide" src="https://images.unsplash.com/photo-1501706362039-c06b2d715385">
  <img class="slide" src="https://images.unsplash.com/photo-1516467508483-a7212febe31a">

  <!-- 中心文字 -->
  <div class="hero-text">
    <h1>动物世界百科</h1>
    <p>探索地球最神奇的生命</p>

    <div class="search">
      <input type="text" placeholder="搜索动物（示例功能）">
    </div>
  </div>
</div>

<!-- 分类 -->
<section class="cards">

  <div class="card">🐘 陆地动物</div>
  <div class="card">🐋 海洋动物</div>
  <div class="card">🦅 鸟类动物</div>
  <div class="card">🌱 动物保护</div>

</section>

<footer>
© 2026 动物世界百科
</footer>

<script>
// ===== 轮播 =====
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
  slides[index].classList.remove("active");
  index = (index+1)%slides.length;
  slides[index].classList.add("active");
},3000);

// ===== 导航滚动变色 =====
window.addEventListener("scroll",()=>{
  let nav = document.getElementById("nav");
  if(window.scrollY>50){
    nav.classList.add("scrolled");
  }else{
    nav.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
